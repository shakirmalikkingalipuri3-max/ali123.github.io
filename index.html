<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shakir Runner 🏃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            touch-action: none;
            user-select: none;
            overflow: hidden;
        }

        #game {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 750px;
            background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
            overflow: hidden;
            border-radius: 0;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
        }

        /* ===== GROUND ===== */
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90px;
            background: linear-gradient(180deg, #2d1f0e, #1a1008);
            border-top: 4px solid #4a3520;
            z-index: 2;
        }

        #groundLine {
            position: absolute;
            top: 30px;
            width: 200%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #6d5a3d 0px, #6d5a3d 40px, transparent 40px, transparent 80px);
            animation: scrollGround 1.2s linear infinite;
        }

        @keyframes scrollGround {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-50%);
            }
        }

        /* ===== PLAYER ===== */
        #player {
            position: absolute;
            bottom: 90px;
            left: 40px;
            width: 65px;
            height: 90px;
            z-index: 10;
            transition: none;
        }

        #player.jump {
            animation: jumpAnim 0.6s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        @keyframes jumpAnim {
            0% {
                transform: translateY(0) scale(1);
            }
            35% {
                transform: translateY(-160px) scale(1.1);
            }
            70% {
                transform: translateY(-180px) scale(1.05);
            }
            100% {
                transform: translateY(0) scale(1);
            }
        }

        #player svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 4px 20px rgba(255, 215, 0, 0.2));
        }

        /* ===== OBSTACLES ===== */
        .obs {
            position: absolute;
            bottom: 90px;
            font-size: 45px;
            z-index: 5;
            animation: moveObs 2s linear forwards;
        }

        @keyframes moveObs {
            from {
                right: -60px;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            to {
                right: calc(100% + 60px);
                opacity: 0;
            }
        }

        /* ===== COINS ===== */
        .coin {
            position: absolute;
            bottom: 150px;
            font-size: 30px;
            z-index: 6;
            animation: moveCoin 2.2s linear forwards;
        }

        @keyframes moveCoin {
            from {
                right: -40px;
                transform: rotate(0deg);
            }
            to {
                right: calc(100% + 40px);
                transform: rotate(720deg);
            }
        }

        /* ===== SCORE ===== */
        #score {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #FFD700;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            z-index: 20;
            border: 2px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        #score span {
            color: white;
        }

        #highScore {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: #aaa;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 20;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #highScore span {
            color: #FFD700;
        }

        /* ===== GAME OVER ===== */
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            padding: 35px 30px;
            border-radius: 25px;
            text-align: center;
            z-index: 30;
            min-width: 260px;
            border: 2px solid rgba(255, 50, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        #gameOver h1 {
            font-size: 32px;
            color: #ff4444;
        }

        #gameOver .final {
            font-size: 44px;
            color: #FFD700;
            font-weight: bold;
            margin: 8px 0;
        }

        #gameOver .best {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 15px;
        }

        #gameOver button {
            font-size: 22px;
            padding: 12px 40px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff6b35, #e63900);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 6px 30px rgba(255, 69, 0, 0.3);
        }

        #gameOver button:active {
            transform: scale(0.95);
        }

        /* ===== INSTRUCTIONS ===== */
        #tip {
            position: absolute;
            bottom: 105px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 14px;
            border-radius: 12px;
            z-index: 15;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            #player {
                width: 50px;
                height: 70px;
                left: 30px;
            }
            .obs {
                font-size: 35px;
            }
            .coin {
                font-size: 24px;
            }
            #score {
                font-size: 20px;
                padding: 6px 14px;
            }
            #highScore {
                font-size: 12px;
                padding: 4px 10px;
            }
            #gameOver {
                padding: 25px 20px;
                min-width: 200px;
            }
            #gameOver h1 {
                font-size: 26px;
            }
            #gameOver .final {
                font-size: 36px;
            }
            #gameOver button {
                font-size: 18px;
                padding: 10px 30px;
            }
            #ground {
                height: 70px;
            }
            #groundLine {
                top: 25px;
            }
            #tip {
                font-size: 10px;
                bottom: 85px;
            }
        }
    </style>
</head>
<body>

    <div id="game">

        <!-- Ground -->
        <div id="ground">
            <div id="groundLine"></div>
        </div>

        <!-- Score -->
        <div id="highScore">🏆 <span id="highVal">0</span></div>
        <div id="score">⭐ <span id="scoreVal">0</span></div>

        <!-- Player - Shakir -->
        <div id="player">
            <svg viewBox="0 0 65 90">
                <!-- Cape -->
                <path d="M32 35 L8 65 L20 68 L32 48 L44 68 L56 65 Z" fill="#cc0000" opacity="0.7"/>
                <!-- Body -->
                <rect x="20" y="35" width="24" height="28" rx="6" fill="#1a5276"/>
                <rect x="18" y="37" width="28" height="6" rx="3" fill="#f1c40f"/>
                <rect x="20" y="55" width="24" height="5" rx="2" fill="#f1c40f"/>
                <!-- Head -->
                <circle cx="32" cy="25" r="12" fill="#f5cba7"/>
                <!-- Mask -->
                <path d="M23 21 Q27 18 32 19 Q37 18 41 21 Q39 24 32 25 Q25 24 23 21 Z" fill="#2c3e50"/>
                <!-- Eyes -->
                <circle cx="28" cy="22" r="2.5" fill="white"/>
                <circle cx="36" cy="22" r="2.5" fill="white"/>
                <circle cx="28" cy="22" r="1.2" fill="#2c3e50"/>
                <circle cx="36" cy="22" r="1.2" fill="#2c3e50"/>
                <!-- Emblem -->
                <text x="24" y="50" font-size="10" fill="#f1c40f" font-weight="bold" font-family="Arial">S</text>
                <!-- Legs -->
                <rect x="22" y="63" width="6" height="12" rx="2" fill="#1a5276"/>
                <rect x="36" y="63" width="6" height="12" rx="2" fill="#1a5276"/>
                <!-- Boots -->
                <rect x="20" y="73" width="9" height="7" rx="2" fill="#c0392b"/>
                <rect x="35" y="73" width="9" height="7" rx="2" fill="#c0392b"/>
            </svg>
        </div>

        <!-- Game Over -->
        <div id="gameOver">
            <h1>💥 Game Over</h1>
            <div class="final">⭐ <span id="finalScore">0</span></div>
            <div class="best">🏆 Best: <span id="finalHigh">0</span></div>
            <button onclick="restartGame()">🔄 Play Again</button>
        </div>

        <div id="tip">👆 Tap / Click to Jump</div>
    </div>

    <script>
        // === DOM ===
        const player = document.getElementById('player');
        const scoreVal = document.getElementById('scoreVal');
        const highVal = document.getElementById('highVal');
        const finalScore = document.getElementById('finalScore');
        const finalHigh = document.getElementById('finalHigh');
        const gameOverDiv = document.getElementById('gameOver');
        const game = document.getElementById('game');

        // === STATE ===
        let score = 0;
        let high = parseInt(localStorage.getItem('shakirRunHigh')) || 0;
        let running = true;
        let jumping = false;
        let speed = 2.2;
        let obsInterval, coinInterval, scoreTimer;

        highVal.textContent = high;

        // === JUMP ===
        function jump() {
            if (!running || jumping) return;
            jumping = true;
            player.classList.add('jump');
            setTimeout(() => {
                player.classList.remove('jump');
                jumping = false;
            }, 600);
        }

        // === CONTROLS ===
        game.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, { passive: false });

        game.addEventListener('mousedown', (e) => {
            e.preventDefault();
            jump();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                jump();
            }
        });

        // === CREATE OBSTACLE ===
        function createObstacle() {
            if (!running) return;
            const list = ['🌵', '🪨', '🧱', '🪹', '🌲'];
            const obs = document.createElement('div');
            obs.className = 'obs';
            obs.textContent = list[Math.floor(Math.random() * list.length)];
            obs.style.fontSize = (35 + Math.random() * 25) + 'px';
            obs.style.animationDuration = (1.8 + Math.random() * 0.6) / (speed / 2.2) + 's';
            game.appendChild(obs);

            const check = setInterval(() => {
                if (!running) { clearInterval(check); return; }
                const p = player.getBoundingClientRect();
                const o = obs.getBoundingClientRect();
                if (p.x < o.x + o.width - 18 &&
                    p.x + p.width - 18 > o.x &&
                    p.y < o.y + o.height - 18 &&
                    p.y + p.height - 18 > o.y) {
                    endGame();
                    clearInterval(check);
                }
            }, 30);

            setTimeout(() => {
                if (obs.parentNode) obs.remove();
            }, 5000 / (speed / 2.2) + 500);
        }

        // === CREATE COIN ===
        function createCoin() {
            if (!running || Math.random() > 0.4) return;
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.textContent = '🪙';
            coin.style.fontSize = (25 + Math.random() * 15) + 'px';
            coin.style.animationDuration = (2.0 + Math.random() * 0.6) / (speed / 2.2) + 's';
            coin.style.bottom = (130 + Math.random() * 60) + 'px';
            game.appendChild(coin);

            const check = setInterval(() => {
                if (!running) { clearInterval(check); return; }
                const p = player.getBoundingClientRect();
                const c = coin.getBoundingClientRect();
                if (p.x < c.x + c.width - 10 &&
                    p.x + p.width - 10 > c.x &&
                    p.y < c.y + c.height - 10 &&
                    p.y + p.height - 10 > c.y) {
                    score += 5;
                    scoreVal.textContent = score;
                    if (coin.parentNode) coin.remove();
                    clearInterval(check);
                    // Sparkle
                    const spark = document.createElement('div');
                    spark.textContent = '✨';
                    spark.style.cssText = 'position:absolute; left:' + c.left + 'px; top:' + c.top + 'px; font-size:24px; z-index:25; pointer-events:none;';
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 300);
                }
            }, 30);

            setTimeout(() => {
                if (coin.parentNode) coin.remove();
            }, 5000 / (speed / 2.2) + 500);
        }

        // === GAME LOOPS ===
        function startScore() {
            scoreTimer = setInterval(() => {
                if (running) {
                    score++;
                    scoreVal.textContent = score;
                    if (score % 15 === 0) {
                        speed += 0.15;
                    }
                }
            }, 80);
        }

        function startObs() {
            if (!running) return;
            createObstacle();
            obsInterval = setTimeout(startObs, 900 / (speed / 2.2) + Math.random() * 400);
        }

        function startCoin() {
            if (!running) return;
            createCoin();
            coinInterval = setTimeout(startCoin, 1200 / (speed / 2.2) + Math.random() * 500);
        }

        // === END GAME ===
        function endGame() {
            running = false;
            gameOverDiv.style.display = 'block';
            finalScore.textContent = score;
            if (score > high) {
                high = score;
                localStorage.setItem('shakirRunHigh', high);
                highVal.textContent = high;
            }
            finalHigh.textContent = high;
            clearInterval(scoreTimer);
            clearTimeout(obsInterval);
            clearTimeout(coinInterval);
            document.querySelectorAll('.obs, .coin').forEach(el => el.remove());
        }

        // === RESTART ===
        function restartGame() {
            running = true;
            score = 0;
            speed = 2.2;
            jumping = false;
            scoreVal.textContent = '0';
            gameOverDiv.style.display = 'none';
            player.classList.remove('jump');
            document.querySelectorAll('.obs, .coin').forEach(el => el.remove());
            startScore();
            startObs();
            startCoin();
        }

        // === START ===
        startScore();
        startObs();
        startCoin();
    </script>

</body>
    </html>
