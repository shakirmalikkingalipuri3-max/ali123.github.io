<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shakir Runner 🏃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            touch-action: none;
            user-select: none;
            overflow: hidden;
        }

        /* ===== CONTAINER ===== */
        #app {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 750px;
            background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
            overflow: hidden;
            border-radius: 0;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
        }

        /* ===== AUTH SCREENS ===== */
        .auth-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.92);
            z-index: 50;
            padding: 30px;
            backdrop-filter: blur(10px);
            transition: opacity 0.3s;
        }

        .auth-screen.hidden {
            display: none;
        }

        .auth-screen h1 {
            color: #FFD700;
            font-size: 36px;
            margin-bottom: 5px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .auth-screen .sub {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .auth-screen input {
            width: 100%;
            max-width: 300px;
            padding: 14px 18px;
            margin: 6px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        .auth-screen input:focus {
            border-color: #FFD700;
        }

        .auth-screen input::placeholder {
            color: #666;
        }

        .auth-screen button {
            width: 100%;
            max-width: 300px;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .auth-screen button:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #f0a500);
            color: #1a1a2e;
        }

        .btn-secondary {
            background: transparent;
            color: #aaa;
            border: 2px solid #444 !important;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        .auth-screen .switch {
            color: #aaa;
            font-size: 14px;
            margin-top: 15px;
        }

        .auth-screen .switch span {
            color: #FFD700;
            cursor: pointer;
            font-weight: bold;
        }

        .auth-screen .error {
            color: #ff4444;
            font-size: 14px;
            margin: 5px 0;
            min-height: 20px;
        }

        .auth-screen .success {
            color: #00ff88;
            font-size: 14px;
            margin: 5px 0;
            min-height: 20px;
        }

        /* ===== ADMIN PANEL ===== */
        #adminPanel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 45;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        #adminPanel.show {
            display: block;
        }

        #adminPanel h2 {
            color: #FFD700;
            font-size: 28px;
            margin: 10px 0;
            text-align: center;
        }

        #adminPanel .admin-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        #adminPanel .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #adminPanel .stat-box .num {
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
        }

        #adminPanel .stat-box .label {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        #adminPanel .user-list {
            margin: 15px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        #adminPanel .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        #adminPanel .user-item .name {
            color: white;
            font-size: 14px;
        }

        #adminPanel .user-item .score {
            color: #FFD700;
            font-weight: bold;
        }

        #adminPanel .user-item .del {
            color: #ff4444;
            cursor: pointer;
            font-size: 18px;
            padding: 0 8px;
        }

        #adminPanel .close-admin {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #888;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
        }

        #adminPanel .close-admin:hover {
            color: white;
        }

        /* ===== GAME (hidden by default) ===== */
        #game {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
        }

        #game.show {
            display: block;
        }

        /* ===== GROUND ===== */
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90px;
            background: linear-gradient(180deg, #2d1f0e, #1a1008);
            border-top: 4px solid #4a3520;
            z-index: 2;
        }

        #groundLine {
            position: absolute;
            top: 30px;
            width: 200%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #6d5a3d 0px, #6d5a3d 40px, transparent 40px, transparent 80px);
            animation: scrollGround 1.2s linear infinite;
        }

        @keyframes scrollGround {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-50%);
            }
        }

        /* ===== PLAYER ===== */
        #player {
            position: absolute;
            bottom: 90px;
            left: 40px;
            width: 65px;
            height: 90px;
            z-index: 10;
            transition: none;
        }

        #player.jump {
            animation: jumpAnim 0.6s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        @keyframes jumpAnim {
            0% {
                transform: translateY(0) scale(1);
            }
            35% {
                transform: translateY(-160px) scale(1.1);
            }
            70% {
                transform: translateY(-180px) scale(1.05);
            }
            100% {
                transform: translateY(0) scale(1);
            }
        }

        #player svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 4px 20px rgba(255, 215, 0, 0.2));
        }

        /* ===== OBSTACLES ===== */
        .obs {
            position: absolute;
            bottom: 90px;
            font-size: 45px;
            z-index: 5;
            animation: moveObs 2s linear forwards;
        }

        @keyframes moveObs {
            from {
                right: -60px;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            to {
                right: calc(100% + 60px);
                opacity: 0;
            }
        }

        /* ===== COINS ===== */
        .coin {
            position: absolute;
            bottom: 150px;
            font-size: 30px;
            z-index: 6;
            animation: moveCoin 2.2s linear forwards;
        }

        @keyframes moveCoin {
            from {
                right: -40px;
                transform: rotate(0deg);
            }
            to {
                right: calc(100% + 40px);
                transform: rotate(720deg);
            }
        }

        /* ===== SCORE ===== */
        #score {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #FFD700;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            z-index: 20;
            border: 2px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        #score span {
            color: white;
        }

        #highScore {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: #aaa;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 20;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #highScore span {
            color: #FFD700;
        }

        #userName {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            z-index: 20;
        }

        /* ===== GAME OVER ===== */
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            padding: 35px 30px;
            border-radius: 25px;
            text-align: center;
            z-index: 30;
            min-width: 260px;
            border: 2px solid rgba(255, 50, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        #gameOver h1 {
            font-size: 32px;
            color: #ff4444;
        }

        #gameOver .final {
            font-size: 44px;
            color: #FFD700;
            font-weight: bold;
            margin: 8px 0;
        }

        #gameOver .best {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 15px;
        }

        #gameOver button {
            font-size: 22px;
            padding: 12px 40px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #gameOver button:active {
            transform: scale(0.95);
        }

        .btn-restart {
            background: linear-gradient(135deg, #FFD700, #f0a500);
            color: #1a1a2e;
        }

        .btn-logout {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        /* ===== TIP ===== */
        #tip {
            position: absolute;
            bottom: 105px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 14px;
            border-radius: 12px;
            z-index: 15;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            #player {
                width: 50px;
                height: 70px;
                left: 30px;
            }
            .obs {
                font-size: 35px;
            }
            .coin {
                font-size: 24px;
            }
            #score {
                font-size: 20px;
                padding: 6px 14px;
            }
            #highScore {
                font-size: 12px;
                padding: 4px 10px;
            }
            #gameOver {
                padding: 25px 20px;
                min-width: 200px;
            }
            #gameOver h1 {
                font-size: 26px;
            }
            #gameOver .final {
                font-size: 36px;
            }
            #gameOver button {
                font-size: 18px;
                padding: 10px 30px;
            }
            #ground {
                height: 70px;
            }
            #groundLine {
                top: 25px;
            }
            #tip {
                font-size: 10px;
                bottom: 85px;
            }
            .auth-screen h1 {
                font-size: 28px;
            }
            .auth-screen input,
            .auth-screen button {
                max-width: 280px;
                padding: 12px 16px;
                font-size: 15px;
            }
            #adminPanel h2 {
                font-size: 24px;
            }
            #adminPanel .stat-box .num {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="app">

        <!-- ========== AUTH - LOGIN ========== -->
        <div id="loginScreen" class="auth-screen">
            <h1>🏃 Shakir Runner</h1>
            <div class="sub">Login to play!</div>
            <input type="text" id="loginUser" placeholder="👤 Username" autocomplete="username">
            <input type="password" id="loginPass" placeholder="🔒 Password" autocomplete="current-password">
            <div class="error" id="loginError"></div>
            <button class="btn-primary" onclick="handleLogin()">🔑 Login</button>
            <div class="switch">New user? <span onclick="showSignup()">Sign Up</span></div>
            <div style="margin-top:10px;">
                <button class="btn-secondary" onclick="guestLogin()" style="padding:10px 25px; font-size:14px; width:auto;">👻 Play as Guest</button>
            </div>
            <div style="margin-top:8px; font-size:11px; color:#444;">Admin: admin / admin123</div>
        </div>

        <!-- ========== AUTH - SIGNUP ========== -->
        <div id="signupScreen" class="auth-screen hidden">
            <h1>🏃 Shakir Runner</h1>
            <div class="sub">Create your account!</div>
            <input type="text" id="signupUser" placeholder="👤 Choose Username">
            <input type="password" id="signupPass" placeholder="🔒 Choose Password">
            <input type="password" id="signupConfirm" placeholder="🔒 Confirm Password">
            <div class="error" id="signupError"></div>
            <div class="success" id="signupSuccess"></div>
            <button class="btn-primary" onclick="handleSignup()">📝 Sign Up</button>
            <div class="switch">Already have account? <span onclick="showLogin()">Login</span></div>
        </div>

        <!-- ========== ADMIN PANEL ========== -->
        <div id="adminPanel">
            <button class="close-admin" onclick="closeAdmin()">✕</button>
            <h2>👑 Admin Dashboard</h2>
            <div class="admin-stats">
                <div class="stat-box">
                    <div class="num" id="adminTotalUsers">0</div>
                    <div class="label">Total Users</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="adminTopScore">0</div>
                    <div class="label">Top Score</div>
                </div>
            </div>
            <h3 style="color:#aaa; font-size:16px; margin:10px 0;">📊 All Users</h3>
            <div class="user-list" id="adminUserList"></div>
            <button class="btn-danger" onclick="clearAllData()" style="width:100%; padding:12px; border:none; border-radius:10px; font-size:16px; cursor:pointer;">🗑️ Reset All Data</button>
        </div>

        <!-- ========== GAME ========== -->
        <div id="game">

            <!-- Ground -->
            <div id="ground">
                <div id="groundLine"></div>
            </div>

            <!-- Score -->
            <div id="highScore">🏆 <span id="highVal">0</span></div>
            <div id="score">⭐ <span id="scoreVal">0</span></div>
            <div id="userName"></div>

            <!-- Player - Shakir -->
            <div id="player">
                <svg viewBox="0 0 65 90">
                    <!-- Cape -->
                    <path d="M32 35 L8 65 L20 68 L32 48 L44 68 L56 65 Z" fill="#cc0000" opacity="0.7"/>
                    <!-- Body -->
                    <rect x="20" y="35" width="24" height="28" rx="6" fill="#1a5276"/>
                    <rect x="18" y="37" width="28" height="6" rx="3" fill="#f1c40f"/>
                    <rect x="20" y="55" width="24" height="5" rx="2" fill="#f1c40f"/>
                    <!-- Head -->
                    <circle cx="32" cy="25" r="12" fill="#f5cba7"/>
                    <!-- Mask -->
                    <path d="M23 21 Q27 18 32 19 Q37 18 41 21 Q39 24 32 25 Q25 24 23 21 Z" fill="#2c3e50"/>
                    <!-- Eyes -->
                    <circle cx="28" cy="22" r="2.5" fill="white"/>
                    <circle cx="36" cy="22" r="2.5" fill="white"/>
                    <circle cx="28" cy="22" r="1.2" fill="#2c3e50"/>
                    <circle cx="36" cy="22" r="1.2" fill="#2c3e50"/>
                    <!-- Emblem -->
                    <text x="24" y="50" font-size="10" fill="#f1c40f" font-weight="bold" font-family="Arial">S</text>
                    <!-- Legs -->
                    <rect x="22" y="63" width="6" height="12" rx="2" fill="#1a5276"/>
                    <rect x="36" y="63" width="6" height="12" rx="2" fill="#1a5276"/>
                    <!-- Boots -->
                    <rect x="20" y="73" width="9" height="7" rx="2" fill="#c0392b"/>
                    <rect x="35" y="73" width="9" height="7" rx="2" fill="#c0392b"/>
                </svg>
            </div>

            <!-- Game Over -->
            <div id="gameOver">
                <h1>💥 Game Over</h1>
                <div class="final">⭐ <span id="finalScore">0</span></div>
                <div class="best">🏆 Best: <span id="finalHigh">0</span></div>
                <button class="btn-restart" onclick="restartGame()">🔄 Play Again</button>
                <br>
                <button class="btn-logout" onclick="logout()">🚪 Logout</button>
            </div>

            <div id="tip">👆 Tap / Click to Jump</div>
        </div>

    </div>

            return JSON.parse(localStorage.getItem('shakirUsers')) || {};
        }

            localStorage.setItem('shakirUsers', JSON.stringify(users));
        }
